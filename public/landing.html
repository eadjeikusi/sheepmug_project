<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SheepMug</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        width: min(560px, 92vw);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.5;
        color: #334155;
      }
      a {
        display: inline-block;
        text-decoration: none;
        background: #0f172a;
        color: #ffffff;
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello World</h1>
      <p>This is the temporary SheepMug landing page. CMS is available at <strong>/cms</strong>.</p>
      <a href="/cms">Open CMS</a>
    </main>
  </body>
</html>
